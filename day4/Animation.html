<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Animation</title>
</head>

<body
    style="margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:linear-gradient(to right,#141e30,#243b55);">

    <div style="
            width:180px;
            height:180px;
            background:orange;
            color:white;
            font-size:28px;
            font-weight:bold;
            text-align:center;
            line-height:180px;
            border-radius:20px;
            cursor:pointer;
            transition:0.5s ease;
            animation:rotateBox 3s infinite alternate;
            box-shadow:0 0 15px rgba(0,0,0,0.4);
            ">BOX
    </div>

    <style>
        div:hover {
            transform: scale(1.2) rotate(15deg) translateY(-15px);
            background: #ff0066;
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.5);

            @keyframes rotateBox {
                0% {
                    transform: rotate(0deg) translateY(0);
                }

                50% {
                    transform: rotate(180deg) translateY(-20px);
                }

                100% {
                    transform: rotate(360deg) translateY(0);
                }
            }
        }
    </style>

</body>

</html>
