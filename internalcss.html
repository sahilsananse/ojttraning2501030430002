<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>internal css</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-image: url(https://www.pixelstalk.net/wp-content/uploads/images8/Dreamland-Desktop-Background-Backgrounds-HD-1080p.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }

        p {
            display: flex;
            text-align: center;
            justify-content: center;
            color: white;
            border: 4px solid rgb(12, 7, 83);
            padding: 20px;
            margin-top: 10px;
            margin-left: 1px;
            margin-right: 1px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-size: 25px;
            font-display: auto;
            background-repeat: no-repeat;
            font-family:'Times New Roman', Times, serif;
        }
    </style>
</head>

<body>
    <header>
        <p class="name">Internal css</p>
    </header>

</body>

</html>
