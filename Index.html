<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My luxury</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }


        header {
            height: auto;

        }

        body {
            background: #f1f3f6;
            height: 120%;
        }

        /* ================= HEADER ================= */

        .header {
            background: #fff;
            padding: 12px 16px;
            border-bottom: 1px solid #ddd;
            position: sticky;
        }

        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        /* LOGO */

        .left-top {
            display: flex;
            align-items: center;
            gap: 20px;
        }


        /* LOCATION */

        .location {
            font-size: 20px;
            font-weight: 300;
        }

        .location span {
            color: #2874f0;
            cursor: pointer;
            font-weight: 600;
        }

        /* Logo Box */
        .logo {

            background-image: url("mylogo.png");
            /* your image */
            background-size: cover;
            background-position: center;
            height: 80px;
            width: 250px;
            border-radius: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            gap: 8px;
            cursor: pointer;
        }

        /* Travel Box */
        .travel {
            background-color: #2874f0;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        hr {
            border: 0.5px solid #3498db;
            /* Specific shade of blue */
        }

        /* SEARCH BAR */

        .search-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;

        }

        .search-box {
            flex: 1;
            background: #fff;
            border: 2px solid rgb(19, 98, 148);
            border-radius: 8px;
            padding: 12px 16pX;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .search-box i {
            font-size: 32px;
            color: gray;
        }

        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 25px;
        }

        /* RIGHT NAV */

        .right-nav {
            display: flex;
            align-items: center;
            gap: 35px;
        }

        .nav-item {
            /* display: flex; */
            align-items: center;
            gap: 10px;
            font-size: 15px;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 30px;
        }

        /* RIGHT NAVIGATION */

        .right-nav {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* NAV ITEM */

        .nav-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            color: #111827;
            font-weight: 200;
            position: relative;
            overflow: hidden;
            transition: 0.4s ease;
            background: white;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        /* ICON */

        .nav-item i {
            font-size: 10px;
            transition: 0.4s;
        }

        /* HOVER EFFECT */

        .nav-item:hover {
            background: #111827;
            color: #00f5ff;
            transform: translateY(-4px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
        }

        /* ICON ANIMATION */

        .nav-item:hover i {
            transform: rotate(10deg) scale(1.2);
            color: #00f5ff;
            color: yellow;
        }

        /* GLOW EFFECT */

        .nav-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: 0.5s;
        }

        .nav-item:hover::before {
            left: 100%;
        }

        /* CLICK EFFECT */

        .nav-item:active {
            transform: scale(0.95);
        }

        /* RESPONSIVE */

        @media(max-width:768px) {

            .right-nav {
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }

            .nav-item {
                padding: 8px 14px;
                font-size: 14px;
            }

            .nav-item i {
                font-size: 15px;
            }
        }



        /* CATEGORY SECTION */
        .category-section {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            padding: 30px 20px;



        }

        /* CATEGORY CARD */
        .category {
            width: 110px;
            background: white;
            border-radius: 20px;
            padding: 12px;
            margin: 2px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            font-family: "poppins", sans-serif;
        }

        .category:hover {
            transform: translateY(-8px);
            background: #111827;
        }

        .category:hover i,
        .category:hover p,
        .category:hover .category-icon {
            color: #00f5ff;
        }

        /* SMALL ICON */
        .category i,
        .category-icon a {
            font-size: 22px;
            margin-bottom: 10px;
            color: #111827;
        }

        /* TEXT */
        .category p {
            font-size: 10px;
            font-weight: 500;
            color: #111827;
            text-transform: capitalize;
            font-family: "Poppins", sans-serif;
            ;
        }

        /* ACTIVE CATEGORY */

        .category .active {
            border: 2px solid #00f5ff;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {

            .header {
                flex-direction: column;
                align-items: center;
            }

            .search-section {
                width: 100%;
            }

            .right-nav {
                flex-wrap: wrap;
                justify-content: center;
            }

            .category {
                width: 90px;
                padding: 12px 8px;
            }

            .category i,
            .category-icon {
                font-size: 18px;
            }

            .category p {
                font-size: 12px;
            }
        }

        /* ACTIVE CATEGORY */

        .active {
            position: relative;
        }

        .active::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 15%;
            width: 70%;
            height: 4px;
            border-radius: 10px;
        }
    </style>


</head>

</html>
