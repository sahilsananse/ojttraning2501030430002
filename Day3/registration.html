<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerceregistration</title>
    <!-- <link rel="stylesheet" href="stylee.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("bg.jpg") no-repeat center center/cover;
            overflow: hidden;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        /* Floating Animation */
        @keyframes floatBox {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Main Container */
        .container {
            width: 430px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            animation: floatBox 3s ease-in-out infinite;
            transition: 0.4s;
        }

        /* Hover Container */
        .container:hover {
            box-shadow: 0 0 35px #00ffff,
                0 0 60px #ff00ff;
            transform: scale(1.02);
        }

        /* Heading */
        .container h2 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 28px;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Input Box */
        .input-box {
            margin-bottom: 15px;
            color: white;
        }

        .input-box label,
        .input-box lable {
            display: block;
            margin-bottom: 6px;
            color: white;
            font-size: 15px;
        }

        /* Inputs */
        .input-box input[type="text"],
        .input-box input[type="email"],
        .input-box input[type="tel"],
        .input-box input[type="password"] {
            width: 100%;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transition: 0.3s;
        }

        /* Placeholder */
        input::placeholder {
            color: #ddd;
        }

        /* Hover Input */
        .input-box input:hover,
        .input-box input:focus {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 12px #00ffff;
            transform: scale(1.03);
        }

        /* Radio */
        input[type="radio"] {
            accent-color: #00ffff;
            margin-right: 5px;
        }

        /* Error */
        .error {
            color: #ff4444;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Login Text */
        p {
            margin-top: 15px;
            text-align: center;
            color: white;
        }

        p a {
            color: #00ffff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
            transition: 0.3s;
        }

        p a:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Sign in</h2>
        <div id="registrationfotm">
            <form id="registerForm">
                <div class="input-box">
                    <lable>Name</lable>
                    <input type="text" id="name" placeholder="Enter your name">
                </div>
                <div class="input-box">
                    <label>Your gender</label>
                    <input type="radio" id="mail">Male <input type="radio" id="feamale">Female
                </div>

                <div class="input-box">
                    <lable>Email</lable>
                    <input type="email" id="email" placeholder="Enter your Email here">
                </div>
                <div class="input-box">
                    <lable>Mobile No</lable>
                    <input type="tel" id="mobileno" placeholder="Enter your mobile number">
                </div>
                <div class="input-box">
                    <label>password</label>
                    <input type="password" id="password" placeholder="Enter your password ">
                </div>
                <!-- <div class="input-box">
                    <label>Confirm password</label>
                    <input type="password" id="password" placeholder="confirmPassword">
                </div> -->
                <div class="error" id="errorMsg"></div>

                <a href="login.html">
                    <!-- <button type="login">Register</button> -->
                    <p>Alredy have account <a href="login.html">Login</a></p>
                </a>
                <!-- <p>Alredy have account<a href="#">Login</a></p> -->
            </form>
        </div>

</body>

</html>
