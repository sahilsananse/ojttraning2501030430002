<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Login Form</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("bg.jpg") no-repeat center center/cover;
            overflow: hidden;
            position: relative;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        /* Animated Neon Lights */
        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #00f7ff;
            filter: blur(130px);
            top: -100px;
            left: -100px;
            animation: moveLight 6s infinite alternate;
        }

        @keyframes moveLight {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(180px, 120px);
            }
        }

        /* Login Box */
        .login-box {
            position: relative;
            z-index: 1;
            width: 380px;
            padding: 40px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            animation: floatBox 3s ease-in-out infinite;
            transition: 0.4s;
        }

        @keyframes floatBox {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .login-box:hover {
            transform: scale(1.03);
            box-shadow:
                0 0 20px #00f7ff,
                0 0 40px #00f7ff,
                0 0 60px #ff00ff;
        }

        /* Heading */
        .login-box h2 {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            font-size: 34px;
            text-shadow: 0 0 12px #00f7ff;
            letter-spacing: 2px;
        }

        /* Input Box */
        .input-box {
            position: relative;
            margin-bottom: 28px;
        }

        .input-box input {
            width: 100%;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 16px;
            transition: 0.4s;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .input-box input:hover,
        .input-box input:focus {
            background: rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 15px #00f7ff;
            transform: scale(1.03);
        }

        /* Floating Labels */
        .input-box label {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #ccc;
            pointer-events: none;
            transition: 0.4s;
        }

        .input-box input:focus~label,
        .input-box input:valid~label {
            top: -8px;
            left: 12px;
            font-size: 13px;
            color: #00f7ff;
            background: #08111f;
            padding: 0 5px;
            text-shadow: 0 0 8px #00f7ff;
        }

        /* Button */
        .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #00f7ff;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }

        .login-btn:hover {
            background: #fff;
            color: #00f7ff;
            letter-spacing: 2px;
            box-shadow:
                0 0 10px #00f7ff,
                0 0 25px #00f7ff,
                0 0 45px #00f7ff;
        }

        .login-btn:active {
            transform: scale(0.95);
        }

        /* Bottom Text */
        .bottom-text {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 14px;
        }

        .bottom-text a {
            color: #00f7ff;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .bottom-text a:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }
    </style>




</head>

<body>

    <div class="login-box">

        <h2>Neon Login</h2>

        <form>

            <div class="input-box">
                <input type="text" required>
                <label>Username</label>
            </div>

            <div class="input-box">
                <input type="password" required>
                <label>Password</label>
            </div>

            <button class="login-btn">LOGIN</button>

            <div class="bottom-text">
                Don't have an account?
                <a href="register.html">Register</a>
            </div>

        </form>

    </div>

</body>

</html>
